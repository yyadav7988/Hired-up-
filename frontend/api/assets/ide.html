<!DOCTYPE html>
<html>
<head>
    <title>Code IDE</title>
</head>
<body style="font-family:sans-serif; padding:20px;">

<h2>🚀 Coding Problem</h2>

<p><b>Question:</b> Print "Hello World"</p>
<p><b>Description:</b> Write a program to print Hello World</p>

<textarea id="editor" style="width:100%; height:200px;">
print("Hello World")
</textarea>

<br><br>

<button id="runBtn">Run Code ▶</button>

<pre id="output" style="background:black; color:lime; padding:10px; margin-top:10px;">
Output will appear here...
</pre>

<script>
document.getElementById("runBtn").onclick = function () {

    const code = document.getElementById("editor").value;

    let result = "";

    if (code.includes("print")) {
        const match = code.match(/print\((.*?)\)/);

        if (match) {
            result = match[1].replace(/['"]/g, "");
        } else {
            result = "Syntax Error";
        }
    } else {
        result = "Executed Successfully ✅";
    }

    document.getElementById("output").innerText = result;
};
</script>

</body>
</html>
