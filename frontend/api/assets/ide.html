<!DOCTYPE html>
<html>
<head>
<title>IDE</title>
<style>
body { margin:0; background:#0f172a; color:white; font-family:Arial; }
.container { display:flex; height:100vh; }
.left { width:40%; padding:20px; border-right:1px solid #333; }
.right { width:60%; display:flex; flex-direction:column; }
textarea { width:100%; height:100%; background:black; color:#22c55e; border:none; }
.console { height:120px; background:black; color:lime; padding:10px; }
button { padding:10px; margin:5px; background:purple; color:white; border:none; }
</style>
</head>

<body>

<div class="container">

<div class="left">
<h2>Two Sum</h2>
<p>Return indices of two numbers that add to target.</p>
</div>

<div class="right">

<textarea id="code">
console.log("Hello HiredUp");
</textarea>

<div>
<button onclick="runCode()">Run</button>
<button onclick="submitCode()">Submit</button>
</div>

<div id="console" class="console">Ready...</div>

</div>

</div>

<script>
function runCode() {
    const code = document.getElementById("code").value;
    const consoleDiv = document.getElementById("console");

    try {
        let output = "";
        const log = console.log;

        console.log = (msg) => output += msg + "\n";

        eval(code);

        console.log = log;

        consoleDiv.innerText = output || "No output";
    } catch(e) {
        consoleDiv.innerText = "Error: " + e.message;
    }
}

function submitCode() {
    document.getElementById("console").innerText = "Accepted ✅";
}
</script>

</body>
</html>
