<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | HiredUp</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            color: var(--text-main);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out forwards;
        }

        .auth-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 0.8rem;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .role-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-option:hover {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.05);
        }

        .role-option.selected {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.1);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .role-option .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .role-option.selected .icon-box {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .role-option span {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .role-option.selected span {
            color: #fff;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid var(--border-glass) !important;
            border-radius: 12px !important;
            padding: 1.2rem 1rem 0.6rem !important;
            color: #fff !important;
            transition: all 0.3s ease !important;
            outline: none !important;
        }

        .input-field:focus {
            border-color: var(--primary) !important;
            background: rgba(0, 0, 0, 0.3) !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1) !important;
        }

        .input-label {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: #64748b;
            font-size: 0.9rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .input-field:focus~.input-label,
        .input-field:not(:placeholder-shown)~.input-label {
            top: 0.4rem;
            left: 1rem;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #4338ca) !important;
            border: none !important;
            padding: 1.25rem !important;
            border-radius: 100px !important;
            color: #fff !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            letter-spacing: 1.5px !important;
            font-size: 0.85rem !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4) !important;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.6) !important;
        }

        .divider {
            margin: 2rem 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .divider span {
            background: #0f172a;
            padding: 0 1rem;
            color: #475569;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 0.75rem;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- Back Home & Theme Toggle -->
    <div
        style="position: absolute; top: 2rem; left: 2rem; right: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
        <a href="index.html"
            style="color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>

        <button id="nav-theme-toggle"
            style="background:none;border:none;color:var(--text-main);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,255,255,0.1);">
            🌙
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('nav-theme-toggle');
            if (themeBtn) {
                const updateBtn = (t) => themeBtn.innerHTML = t === 'light' ? '🌙' : '☀️';
                const savedTheme = localStorage.getItem('hiredUpTheme') || 'dark';
                updateBtn(savedTheme);

                themeBtn.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('hiredUpTheme', newTheme);
                    updateBtn(newTheme);

                    const floatingBtns = document.querySelectorAll('.theme-toggle-btn');
                    floatingBtns.forEach(btn => btn.innerHTML = newTheme === 'light' ? '🌙' : '☀️');
                });
            }
        });
    </script>

    <div class="auth-container">
        <!-- Background Elements -->
        <div
            style="position: absolute; top: -10%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 60%); filter: blur(60px);">
        </div>

        <div class="glass-card auth-card animate-fade-in">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="mb-2">Welcome Back</h2>
                <p id="auth-desc" class="text-sm">Enter your credentials to access the platform.</p>
            </div>

            <!-- Login/Signup Toggle -->
            <div class="auth-tabs">
                <div class="auth-tab active" data-target="login">Log In</div>
                <div class="auth-tab" data-target="signup">Sign Up</div>
            </div>

            <!-- Role Selector -->
            <div id="role-selector-container" class="role-selector">
                <div class="role-option selected" data-role="candidate">
                    <div class="icon-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <span>Candidate</span>
                </div>
                <div class="role-option" data-role="recruiter">
                    <div class="icon-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                    </div>
                    <span>Recruiter</span>
                </div>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <!-- Shared Inputs -->
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="input-label">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="input-label">Password</label>
                </div>

                <!-- Signup Only Inputs -->
                <div id="signup-fields" class="hidden">
                    <div class="input-group">
                        <input type="text" id="fullname" class="input-field" placeholder=" ">
                        <label for="fullname" class="input-label">Full Name</label>
                    </div>

                    <!-- Recruiter Specific Fields -->
                    <div id="recruiter-fields" class="hidden">
                        <div class="input-group">
                            <input type="text" id="companyName" class="input-field" placeholder=" ">
                            <label for="companyName" class="input-label">Company Name</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="designation" class="input-field" placeholder=" ">
                            <label for="designation" class="input-label">Designation</label>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-8 text-sm">
                    <label class="flex items-center gap-2" style="color: #64748b; cursor: pointer;">
                        <input type="checkbox" style="accent-color: #7c3aed; width: 16px; height: 16px;"> Remember me
                    </label>
                    <a href="#" style="color: #6366f1; font-weight: 600;">Forgot password?</a>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary w-full">Log In</button>
            </form>

            <div class="divider"><span>OR CONTINUE WITH</span></div>

            <div class="grid grid-cols-2 gap-4">
                <button type="button" class="social-btn flex items-center justify-center gap-3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    Github
                </button>
                <button type="button" class="social-btn flex items-center justify-center gap-3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307c-1.813-1.693-4.213-3.24-8.213-3.24-6.6 0-12 5.4-12 12s5.4 12 12 12c3.467 0 6.373-1.147 8.453-3.293 2.187-2.187 2.853-5.413 2.853-8.293 0-.827-.08-1.573-.24-2.32h-11.16z" />
                    </svg>
                    Google
                </button>
            </div>
        </div>
    </div>

    <script src="api_utils.js"></script>
    <script src="app.js"></script>

    <script>
        let currentMode = "login";
        let selectedRole = "candidate";

        // Toggle tabs
        document.querySelectorAll(".auth-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");

                currentMode = tab.dataset.target;

                document.getElementById("signup-fields").classList.toggle("hidden", currentMode === "login");
                document.getElementById("submit-btn").innerText = currentMode === "login" ? "Log In" : "Sign Up";
            });
        });

        // Role select
        document.querySelectorAll(".role-option").forEach(option => {
            option.addEventListener("click", () => {
                document.querySelectorAll(".role-option").forEach(o => o.classList.remove("selected"));
                option.classList.add("selected");

                selectedRole = option.dataset.role;

                document.getElementById("recruiter-fields").classList.toggle("hidden", selectedRole !== "recruiter");
            });
        });

        // AUTH FUNCTION - overrides the one in app.js for this page
        async function handleAuth(e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // Backend expects uppercase: CANDIDATE / RECRUITER
            const role = selectedRole === "recruiter" ? "RECRUITER" : "CANDIDATE";

            let url = `${window.API_BASE_URL || ""}/api/auth/login`;
            let body = { email, password };

            // SIGNUP MODE
            if (currentMode === "signup") {
                url = `${window.API_BASE_URL || ""}/api/auth/register`;

                body = {
                    email,
                    password,
                    role,
                    fullname: document.getElementById("fullname").value.trim() || "User",
                };

                if (role === "RECRUITER") {
                    body.companyName = document.getElementById("companyName").value.trim();
                    body.designation = document.getElementById("designation").value.trim();
                }
            }

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    mode: "cors",
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || data.message || "Something went wrong");
                    return;
                }

                // Save session (backend returns accessToken + refreshToken)
                if (data.accessToken) {
                    localStorage.setItem("hiredUpToken", data.accessToken);
                }
                if (data.refreshToken) {
                    localStorage.setItem("hiredUpRefreshToken", data.refreshToken);
                }
                if (data.user) {
                    // Normalize: ensure both fullName and fullname are present in stored user
                    const userToStore = {
                        ...data.user,
                        fullName: data.user.fullName || data.user.fullname || "",
                        fullname: data.user.fullName || data.user.fullname || "",
                    };
                    localStorage.setItem("hiredUpUser", JSON.stringify(userToStore));
                    localStorage.setItem("userSkills", JSON.stringify(userToStore.skills || []));
                }

                // Role-based redirect
                const userRole = String(data.user?.role || "").toUpperCase();
                const redirectUrl = userRole === "RECRUITER" ? "recruiter.html" : "profile.html";
                window.location.href = redirectUrl;

            } catch (err) {
                console.error(err);
                alert("Server error — is the backend running?");
            }
        }
    </script>

</body>

</html>
